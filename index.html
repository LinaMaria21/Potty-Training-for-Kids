<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Potty Time Hero</title>

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:linear-gradient(#fff8e6,#e9f7ff);
    text-align:center;
}

header{
    padding:20px;
}

h1{
    color:#ff5aa5;
}

.sub{
    margin-bottom:20px;
}

input{
    padding:12px;
    font-size:18px;
    border-radius:10px;
    border:1px solid #ccc;
    width:250px;
}

#bigBtn{
    margin-top:20px;
    font-size:34px;
    background:linear-gradient(#4caf50,#2e8b57);
    color:white;
    padding:28px 40px;
    border:none;
    border-radius:28px;
    cursor:pointer;
    box-shadow:0 6px 0 #26774f;
}

#bigBtn:active{
    transform:translateY(3px);
    box-shadow:0 3px 0 #26774f;
}

#reward{
    display:none;
    margin-top:20px;
}

#reward img{
    max-width:85%;
    border-radius:12px;
}

nav{
    margin-top:20px;
}

a{
    color:#4a90e2;
    text-decoration:none;
}

.confetti{
    position:fixed;
    top:0;
    left:0;
    right:0;
    pointer-events:none;
    z-index:9999;
}

.confetti span{
    position:absolute;
    width:10px;
    height:14px;
    animation:fall 1.2s linear forwards;
}

@keyframes fall{
0%{
transform:translateY(-10vh) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}
}
</style>

</head>

<body>

<header>

<h1>Potty Time Hero 🚽✨</h1>

<div class="sub">
Tap the big button when you went potty!
</div>

</header>

<main>

<div>
<label><strong>Child's Name</strong></label><br><br>

<input
id="childId"
type="text"
placeholder="Enter child's name"
value="Emma">
</div>

<br>

<button id="bigBtn" onclick="handleTap()">
I went potty!
</button>

<div id="reward">

<h2>🎉 Great Job! 🎉</h2>

<p>
You earned
<span id="count">0</span>
reward(s)
</p>

<img src="https://media2.giphy.com/media/JZLaL7vxYBMwOw4Vjd/giphy.gif">

</div>

<nav>

<a href="rewards.html">Rewards</a> |
<a href="parents.html">Parents</a>

</nav>

</main>

<div id="confettiArea" class="confetti"></div>

<audio id="cheerSound" src="greatjob.mp3"></audio>

<script>

let busy=false;

async function handleTap(){

if(busy) return;

busy=true;

setTimeout(()=>{
busy=false;
},2000);

const childId=document.getElementById("childId").value.trim();

try{

const response=await fetch(
"https://67q8x01rs0.execute-api.us-east-2.amazonaws.com/reward",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
childId:childId
})
});

const data = await response.json();

document.getElementById("count").textContent = data.rewards;

document.getElementById("reward").style.display="block";

document.getElementById("cheerSound").play();

createConfetti(30);

}catch(err){

console.error(err);

alert("Unable to save reward.");

}

}

function createConfetti(count){

const area=document.getElementById("confettiArea");

for(let i=0;i<count;i++){

const piece=document.createElement("span");

piece.style.left=Math.random()*100+"%";

piece.style.background=randomColor();

piece.style.animationDuration=(900+Math.random()*600)+"ms";

area.appendChild(piece);

setTimeout(()=>{
piece.remove();
},1600);

}

}

function randomColor(){

const colors=[
"#ff5aa5",
"#ffd166",
"#06d6a0",
"#4cc9f0",
"#f94144",
"#ffb703"
];

return colors[Math.floor(Math.random()*colors.length)];

}

</script>

</body>
</html>
